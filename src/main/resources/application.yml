server:
  port: 8080

spring:
  application:
    name: bookstore-api
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:mysql://localhost:3306/bookstoredb2?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  web:
    error:
      include-message: always

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 86400000

logging:
  level:
    root: INFO
    com.bookstores: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs


ai:
  gemini:
    api-key: ${GEMINI_API_KEY}
    api-url: "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent"
    system-prompt: |
      Bạn là một nhân viên tư vấn nhiệt tình của nhà sách The Archive. 
      Nhiệm vụ của bạn là tư vấn sách cho khách hàng một cách thân thiện và ngắn gọn.
      Nếu khách hàng hỏi sách, hãy gợi ý những cuốn sách phù hợp. 
      Bạn chỉ được phép tư vấn về sách, nếu hỏi chủ đề khác hãy từ chối khéo léo.
